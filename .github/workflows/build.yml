# Build Codex App (Intel)
name: Build Codex App (Intel)

permissions:
  contents: write
  attestations: write
  id-token: write

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:
    inputs:
      is_release:
        description: 'This is a release build'
        required: false
        default: 'false'
        type: boolean

jobs:
  build:
    name: Build Codex.app
    runs-on: macos-15-intel # Explicitly use Intel-based macOS runner
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          
      - name: Read version
        id: version
        run: |
          VERSION=$(jq -r '.version' version.json)
          BUILD=$(jq -r '.build' version.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build=$BUILD" >> $GITHUB_OUTPUT
          
      - name: Install & Build
        run: make build
        
      - name: Move Build Artifact
        run: |
          mkdir Codex
          mv Codex.app Codex
          
      - name: Upload Artifact for Build
        uses: actions/upload-artifact@v6
        with:
          name: Codex-build
          path: Codex
          retention-days: 30
          if-no-files-found: error
          
      - name: Create Release
        if: github.event_name == 'workflow_dispatch' && inputs.is_release == 'true'
        id: create_release
        run: |
        if: github.event_name == 'workflow_dispatch' && inputs.is_release == 'true'
        run: |
          # Create zip archive for release
          cd Codex
          zip -r ../Codex-${{ steps.version.outputs.version }}.zip .
          cd ..
          
          # Get DMG size
          SIZE=$(ls -l Codex-${{ steps.version.outputs.version }}.zip | awk '{print $5}')
          
          # Create GitHub Release
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "Codex Intel v${{ steps.version.outputs.version }}" \
            --notes "Auto-built Intel version of Codex ${{ steps.version.outputs.version }} (build ${{ steps.version.outputs.build }})

This is an **unofficial** Intel build of [Codex](https://openai.com/codex) for Apple Silicon.

## Usage
1. Download the zip
2. Extract and run Codex.app
3. If you see 'App is damaged', run: \`xattr -cr Codex.app\`

## Version Info
- Version: ${{ steps.version.outputs.version }}
- Build: ${{ steps.version.outputs.build }}
- Target: Intel (x86_64)
- Source: macOS ARM64 DMG" \
            Codex-${{ steps.version.outputs.version }}.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Upload to Release
        if: github.event_name == 'workflow_dispatch' && inputs.is_release == 'true'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: Codex-${{ steps.version.outputs.version }}.zip
          asset_name: Codex-${{ steps.version.outputs.version }}.zip
          asset_content_type: application/zip
